<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Flappy Bird - Phaser 3</title>
    <!-- Nhúng thư viện Phaser 3 qua CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
        }
        canvas {
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<script>
    class MainScene extends Phaser.Scene {
        constructor() {
            super({ key: 'MainScene' });
        }

        // 1. CHUẨN BỊ TÀI NGUYÊN (PRELOAD)
        preload() {
            // Thay vì dùng ảnh ngoài, chúng ta sẽ tự vẽ texture cho chim và ống nước
            let graphics = this.make.graphics({x: 0, y: 0, add: false});
            
            // Vẽ con chim (hình vuông màu vàng)
            graphics.fillStyle(0xf1c40f, 1);
            graphics.fillRect(0, 0, 30, 30);
            graphics.generateTexture('bird', 30, 30);
            
            graphics.clear();

            // Vẽ ống nước (hình chữ nhật màu xanh lá)
            graphics.fillStyle(0x2ecc71, 1);
            graphics.fillRect(0, 0, 50, 600);
            graphics.generateTexture('pipe', 50, 600);
        }

        // 2. KHỞI TẠO GAME (CREATE)
        create() {
            // Nền trời
            this.cameras.main.setBackgroundColor('#71c5cf');

            // Thêm con chim vào màn hình
            this.bird = this.physics.add.sprite(100, 245, 'bird');
            // Thêm trọng lực để chim rơi xuống
            this.bird.body.gravity.y = 1000;

            // Nhóm chứa các ống nước
            this.pipes = this.physics.add.group();

            // Hàm tạo ống nước mỗi 1.5 giây
            this.time.addEvent({
                delay: 1500,
                callback: this.addRowOfPipes,
                callbackScope: this,
                loop: true
            });

            // Lắng nghe sự kiện phím Space hoặc click chuột để nhảy
            this.input.keyboard.on('keydown-SPACE', this.jump, this);
            this.input.on('pointerdown', this.jump, this);

            // Điểm số
            this.score = 0;
            this.labelScore = this.add.text(20, 20, '0', { font: '30px Arial', fill: '#ffffff' });
            this.labelScore.setDepth(1); // Đảm bảo điểm số luôn hiển thị trên cùng

            // Xử lý va chạm giữa chim và ống nước
            this.physics.add.overlap(this.bird, this.pipes, this.hitPipe, null, this);
        }

        // 3. VÒNG LẶP GAME (UPDATE)
        update() {
            // Nếu chim rớt ra khỏi màn hình (trên hoặc dưới) -> Game Over
            if (this.bird.y < 0 || this.bird.y > 600) {
                this.restartGame();
            }

            // Xoay chim một chút khi rơi để tạo hiệu ứng
            if (this.bird.angle < 20) {
                this.bird.angle += 1;
            }

            // Tính điểm: Nếu chim vượt qua ống nước
            for (let pipe of this.pipes.getChildren()) {
                if (pipe.getBounds().right < this.bird.getBounds().left && !pipe.scored) {
                    pipe.scored = true;
                    this.score += 0.5; // Mỗi cột có 2 ống (trên và dưới), nên cộng 0.5 mỗi ống
                    this.labelScore.setText(Math.floor(this.score));
                }
                // Xóa ống nước khi đã bay ra khỏi mép trái màn hình để giải phóng bộ nhớ
                if (pipe.x < -50) {
                    pipe.destroy();
                }
            }
        }

        // HÀM: Chim nhảy lên
        jump() {
            // Nếu chim đang chết thì không cho nhảy
            if (!this.bird.active) return;
            
            // Vận tốc hướng lên (âm vì trục Y hướng xuống)
            this.bird.body.velocity.y = -350;
            
            // Hiệu ứng ngóc đầu lên khi nhảy
            this.scene.scene.tweens.add({
                targets: this.bird,
                angle: -20,
                duration: 100
            });
        }

        // HÀM: Thêm một phần của ống nước
        addOnePipe(x, y) {
            let pipe = this.physics.add.sprite(x, y, 'pipe');
            this.pipes.add(pipe);
            
            // Ống nước di chuyển sang trái
            pipe.body.velocity.x = -200;
            // Ống nước không bị rơi bởi trọng lực
            pipe.body.allowGravity = false;
            // Thuộc tính tùy chỉnh để tính điểm
            pipe.scored = false; 
        }

        // HÀM: Thêm 1 cột gồm 2 ống (trên và dưới) chừa khoảng trống ở giữa
        addRowOfPipes() {
            // Chọn ngẫu nhiên vị trí của khoảng trống (từ ô thứ 1 đến ô thứ 5)
            // Lưới chia màn hình làm 8 ô (mỗi ô 600/8 = 75px chiều cao)
            let hole = Math.floor(Math.random() * 5) + 1;

            for (let i = 0; i < 8; i++) {
                // Nếu không thuộc khoảng trống thì tạo ống
                if (i !== hole && i !== hole + 1 && i !== hole + 2) {
                    // Căn chỉnh tâm của ống nước
                    this.addOnePipe(400, i * 75 + 37.5);
                }
            }
        }

        // HÀM: Khi chim đụng ống nước
        hitPipe() {
            // Ngừng sinh ống nước mới
            if (!this.bird.active) return;
            this.bird.active = false;
            this.restartGame();
        }

        // HÀM: Chơi lại game
        restartGame() {
            // Khởi động lại Scene này
            this.scene.restart();
        }
    }

    // CẤU HÌNH PHASER GAME
    const config = {
        type: Phaser.AUTO,
        width: 400, // Chiều rộng màn hình game
        height: 600, // Chiều cao màn hình game
        physics: {
            default: 'arcade',
            arcade: {
                debug: false // Đổi thành true nếu muốn xem khung va chạm (hitbox)
            }
        },
        scene: MainScene
    };

    const game = new Phaser.Game(config);
</script>

</body>
</html>
