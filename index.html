<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Screen - Phaser 3</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
        }
        canvas {
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<script>
    class MenuScene extends Phaser.Scene {
        constructor() {
            super({ key: 'MenuScene' });
        }

        preload() {
            // MẸO: Nếu bạn có file ảnh nền nhân vật (ví dụ: background.jpg),
            // hãy bỏ comment dòng dưới đây và load ảnh của bạn vào.
            // this.load.image('bg', 'assets/background.jpg');
        }

        create() {
            // 1. BACKGROUND (Nền)
            // Nếu có ảnh nền, dùng: this.add.image(375, 375, 'bg').setDisplaySize(750, 750);
            // Ở đây mình dùng nền màu xanh rêu tối (Dark Green)
            this.cameras.main.setBackgroundColor('#101815');

            // 2. KHUNG VIỀN TRANG TRÍ (Borders)
            const graphics = this.add.graphics();
            graphics.lineStyle(1, 0x4a5948, 1);
            
            // Viền ngoài cùng
            graphics.strokeRect(20, 20, 710, 710);
            // Đường kẻ ngang dưới Header
            graphics.beginPath();
            graphics.moveTo(20, 100);
            graphics.lineTo(730, 100);
            graphics.strokePath();

            // 3. HEADER (Phần trên cùng)
            this.createHeader(graphics);

            // 4. PHẦN TEXT BÊN TRÁI (Left Content)
            this.createLeftContent();

            // 5. DANH SÁCH NÚT MENU BÊN PHẢI (Right Menu)
            const menuStartX = 410;
            const menuStartY = 140;
            const menuSpacing = 110;

            this.createMenuButton(menuStartX, menuStartY, '01', 'New Campaign', 'Start a new campaign');
            this.createMenuButton(menuStartX, menuStartY + menuSpacing * 1, '02', 'Continue', 'Load your most recent save');
            this.createMenuButton(menuStartX, menuStartY + menuSpacing * 2, '03', 'Guide', 'How to play and win');
            this.createMenuButton(menuStartX, menuStartY + menuSpacing * 3, '04', 'Credit', 'About the creator');
            this.createMenuButton(menuStartX, menuStartY + menuSpacing * 4, '05', 'Leaderboard', 'Players\' achievements');
        }

        createHeader(graphics) {
            // Logo Icon (Khối vuông màu vàng)
            graphics.fillStyle(0xd5bd89, 1);
            graphics.fillRect(40, 40, 40, 40);
            // Kẻ chữ thập đen trong logo
            graphics.lineStyle(2, 0x101815, 1);
            graphics.beginPath();
            graphics.moveTo(45, 60); graphics.lineTo(75, 60);
            graphics.moveTo(60, 45); graphics.lineTo(60, 75);
            graphics.strokePath();

            // Tên game
            this.add.text(95, 42, 'Loạn 12 Sứ Quân', { 
                fontFamily: 'Georgia, serif', fontSize: '24px', fontStyle: 'bold', color: '#d5bd89' 
            });
            this.add.text(95, 70, 'Legacy of the Twelve Warlords', { 
                fontFamily: 'Arial, sans-serif', fontSize: '11px', color: '#88988e' 
            });

            // Nút Settings
            graphics.lineStyle(1, 0x4a5948, 1);
            graphics.strokeRoundedRect(480, 45, 90, 30, 15);
            this.add.text(525, 60, '⚙ Settings', { 
                fontFamily: 'Arial', fontSize: '12px', fontStyle: 'bold', color: '#a3b1a6' 
            }).setOrigin(0.5);

            // User Profile
            graphics.strokeRoundedRect(585, 35, 135, 50, 4);
            // Avatar (Hình tròn tượng trưng)
            graphics.fillStyle(0x759c82, 1);
            graphics.fillCircle(610, 60, 15);
            
            this.add.text(635, 45, 'Lê Thành Long', { 
                fontFamily: 'Arial', fontSize: '13px', fontStyle: 'bold', color: '#d5bd89' 
            });
            this.add.text(635, 63, 'Bấm để đăng xuất', { 
                fontFamily: 'Arial', fontSize: '10px', color: '#88988e' 
            });
        }

        createLeftContent() {
            // Subtitle nhỏ
            this.add.text(40, 380, 'A REALM WITHOUT A RULER · HEROES RISE', {
                fontFamily: 'Arial, sans-serif', fontSize: '11px', fontStyle: 'bold', color: '#d5bd89', letterSpacing: '2px'
            });

            // Tiêu đề chính lớn
            this.add.text(40, 410, 'Who will unite\nthe realm as one?', {
                fontFamily: 'Georgia, serif', fontSize: '42px', fontStyle: 'bold', color: '#ffffff', lineSpacing: 10
            });

            // Đoạn văn miêu tả
            this.add.text(40, 540, 'The year 966. Twelve warlords hold their\nground, gates shut, the fighting unending.', {
                fontFamily: 'Georgia, serif', fontSize: '16px', color: '#cccccc', lineSpacing: 8
            });
        }

        createMenuButton(x, y, num, title, desc) {
            const width = 300;
            const height = 90;

            // Container chứa cả nút
            const container = this.add.container(x, y);

            // Hình nền của nút
            const bg = this.add.graphics();
            
            // Hàm vẽ trạng thái bình thường
            const drawNormal = () => {
                bg.clear();
                bg.fillStyle(0x1a241d, 0.85); // Nền xanh rêu đậm
                bg.fillRoundedRect(0, 0, width, height, 4);
                bg.lineStyle(2, 0x4a5948, 1); // Viền mờ
                bg.strokeRoundedRect(0, 0, width, height, 4);
            };

            // Hàm vẽ trạng thái khi hover (Di chuột)
            const drawHover = () => {
                bg.clear();
                bg.fillStyle(0x233128, 1); // Sáng hơn một chút
                bg.fillRoundedRect(0, 0, width, height, 4);
                bg.lineStyle(2, 0xd5bd89, 1); // Viền vàng sáng lên
                bg.strokeRoundedRect(0, 0, width, height, 4);
            };

            drawNormal(); // Vẽ mặc định ban đầu
            container.add(bg);

            // Số thứ tự (01, 02...)
            const numText = this.add.text(25, height / 2, num, {
                fontFamily: 'Georgia, serif', fontSize: '20px', fontStyle: 'bold', color: '#d5bd89'
            }).setOrigin(0, 0.5);
            container.add(numText);

            // Tiêu đề nút
            const titleText = this.add.text(75, 32, title, {
                fontFamily: 'Georgia, serif', fontSize: '24px', fontStyle: 'bold', color: '#ffffff'
            }).setOrigin(0, 0.5);
            container.add(titleText);

            // Chú thích nhỏ bên dưới
            const descText = this.add.text(75, 60, desc, {
                fontFamily: 'Arial, sans-serif', fontSize: '13px', color: '#88988e'
            }).setOrigin(0, 0.5);
            container.add(descText);

            // Vẽ Icon kim cương nhỏ ở góc phải
            const diamond = this.add.graphics();
            diamond.fillStyle(0x6a7266, 1);
            diamond.translateCanvas(width - 30, height / 2);
            diamond.fillPoints([{x: 0, y: -6}, {x: 6, y: 0}, {x: 0, y: 6}, {x: -6, y: 0}]);
            container.add(diamond);

            // Bật tính năng tương tác (Click, Hover)
            const hitArea = new Phaser.Geom.Rectangle(0, 0, width, height);
            container.setInteractive(hitArea, Phaser.Geom.Rectangle.Contains);

            // Đổi màu khi đưa chuột vào
            container.on('pointerover', () => {
                drawHover();
                diamond.clear();
                diamond.fillStyle(0xd5bd89, 1); // Kim cương sáng lên
                diamond.translateCanvas(width - 30, height / 2);
                diamond.fillPoints([{x: 0, y: -6}, {x: 6, y: 0}, {x: 0, y: 6}, {x: -6, y: 0}]);
                document.body.style.cursor = 'pointer';
            });

            // Trở lại bình thường khi đưa chuột ra
            container.on('pointerout', () => {
                drawNormal();
                diamond.clear();
                diamond.fillStyle(0x6a7266, 1);
                diamond.translateCanvas(width - 30, height / 2);
                diamond.fillPoints([{x: 0, y: -6}, {x: 6, y: 0}, {x: 0, y: 6}, {x: -6, y: 0}]);
                document.body.style.cursor = 'default';
            });

            // Xử lý sự kiện click
            container.on('pointerdown', () => {
                console.log(`Bạn đã click vào nút: ${title}`);
                // Thêm logic chuyển Scene (chuyển màn hình) ở đây
            });
        }
    }

    const config = {
        type: Phaser.AUTO,
        width: 750,
        height: 750,
        scene: MenuScene,
        scale: {
            // Tự động scale cho vừa màn hình nếu màn hình nhỏ hơn 750
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH
        }
    };

    const game = new Phaser.Game(config);
</script>

</body>
</html>
